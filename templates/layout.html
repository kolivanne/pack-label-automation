<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PRODUCT_NAME}}</title>

    <style>
      :root {
        --brand-color: {{COLOR}};
      }

      body {
        font-family: Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f0f0;

        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .packaging-mockup {
        width: 400px;
        min-height: 600px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .header-bar {
        height: 20px;
        background-color: var(--brand-color);
      }

      .content {
        padding: 40px;
        flex-grow: 1;
        border-left: 15px solid var(--brand-color);
      }

      h1 {
        margin: 0;
        font-size: 2.5em;
        color: #333;
      }

      .flavor {
        font-size: 1.2em;
        color: #666;
        font-style: italic;
      }

      .claims-list {
        margin-top: 50px;
        padding-left: 20px;
      }

      .claims-list li {
        color: var(--brand-color);
        font-weight: bold;
        margin-bottom: 10px;
      }

      .footer {
        padding: 20px;
        background: #eee;
        text-align: right;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="packaging-mockup">
      <div class="header-bar"></div>

      <div class="content">
        <h1>{{PRODUCT_NAME}}</h1>

        {{#if FLAVOR}}
        <p class="flavor">{{FLAVOR}}</p>
        {{/if}}

        <ul class="claims-list">
          {{#each CLAIMS}}
          <li>{{this}}</li>
          {{/each}}
        </ul>
      </div>

      <div class="footer">Weight: {{WEIGHT}}</div>
    </div>
  </body>
</html>
