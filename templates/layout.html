<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Doggo's Premium Paws</title>
    <style>
        :root {
            --brand-color: {{COLOR}};
            --bg-color: #fdfaf5;
            --text-color: #332211;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        .packaging-mockup {
            width: 450px;
            height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(139, 69, 19, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid #e0d0b0;
        }
        .brand-header {
            background-color: var(--brand-color);
            padding: 15px;
            text-align: center;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            font-size: 0.9em;
        }
        .content {
            padding: 40px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .main-info h1 {
            margin: 0;
            font-size: 2.8em;
            color: var(--brand-color);
            line-height: 1.1;
        }
        .flavor {
            font-size: 1.4em;
            color: #776655;
            margin-top: 10px;
            font-weight: 300;
        }
        .claims-box {
            background-color: #fff8f0;
            border-radius: 10px;
            padding: 20px;
            border-left: 5px solid var(--brand-color);
            margin-top: 30px;
        }
        .claims-list {
            margin: 0;
            padding-left: 20px;
            list-style-type: '🐾 ';
        }
        .claims-list li {
            margin-bottom: 8px;
            font-weight: 500;
        }
        .footer {
            padding: 20px 40px;
            background: #f8f0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0d0b0;
        }
        .weight {
            font-size: 1.2em;
            font-weight: bold;
        }
        .paw-icon {
            font-size: 2em;
            color: var(--brand-color);
        }
    </style>
</head>
<body>
    <div class="packaging-mockup">
        <div class="brand-header">HOT DOGGO'S PREMIUM PAWS</div>
        <div class="content">
            <div class="main-info">
                <h1>{{PRODUCT_NAME}}</h1>
                <p class="flavor">{{FLAVOR}}</p>
                <div class="claims-box">
                    <ul class="claims-list">
                        {{CLAIMS}}
                    </ul>
                </div>
            </div>
        </div>
        <div class="footer">
            <span class="paw-icon">🐾</span>
            <span class="weight">{{WEIGHT}}</span>
        </div>
    </div>
</body>
</html>
